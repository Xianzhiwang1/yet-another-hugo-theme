<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F1FAEE">
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1D3557">
    <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <!-- Google Fonts: Cormorant Garamond (headings) + Proza Libre (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Proza+Libre:ital,wght@0,400;0,500;0,600;1,400&display=swap">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" type="text/css">
    {{ with .OutputFormats.Get "rss" -}}
        {{ printf `<link rel="%s" type="%s" href="%s" title="%s" />` .Rel .MediaType.Type .Permalink $.Site.Title | safeHTML }}
    {{ end -}}
</head>
<body>
    <div class="container">
        {{ partial "sidebar.html" . }}
        <main class="main-content">
            {{ block "main" . }}{{ end }}
            {{ partial "home-button.html" . }}
        </main>
    </div>
</body>
</html>
